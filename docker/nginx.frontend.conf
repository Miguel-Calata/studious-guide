server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para assets estáticos
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy de la API al backend (mismo origen en producción).
    # En local el backend responde en el host; ajústalo si es necesario.
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Necesario para cookies httpOnly de auth
        proxy_set_header X-Forwarded-Host $host;
        # Timeout y buffering para subidas grandes de archivos
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Proxy público (sin auth) — visor de compendios.
    location /public/ {
        proxy_pass http://backend:8000/public/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Soporte de SPA: cualquier ruta no-existente cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets con hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
