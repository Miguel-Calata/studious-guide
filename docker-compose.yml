services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-sam_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sam} -d ${POSTGRES_DB:-sam_platform}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sam}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-sam_platform}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      PDF_STORAGE_PATH: /app/data/pdfs
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      MAX_FILES_PER_UPLOAD: ${MAX_FILES_PER_UPLOAD:-15}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-compendiums}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-}
      DEBUG: ${DEBUG:-false}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-}
      FRONTEND_URL: ${FRONTEND_URL:?}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      NOTION_OAUTH_CLIENT_ID: ${NOTION_OAUTH_CLIENT_ID:-}
      NOTION_OAUTH_CLIENT_SECRET: ${NOTION_OAUTH_CLIENT_SECRET:-}
      NOTION_OAUTH_REDIRECT_URI: ${NOTION_OAUTH_REDIRECT_URI:-}
    volumes:
      - pdf_data:/app/data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    command: arq app.workers.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sam}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-sam_platform}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      PDF_STORAGE_PATH: /app/data/pdfs
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-compendiums}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-}
      DEBUG: ${DEBUG:-false}
    volumes:
      - pdf_data:/app/data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    # Local: http://localhost:5173. En Coolify asigna el dominio a este servicio (puerto 80).
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # Solo desarrollo local: docker compose --profile local up --build
  minio:
    profiles: ["local"]
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  pdf_data:
  minio_data:
